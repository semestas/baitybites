<!DOCTYPE html>
<html lang="id">

<head>
    <title>Login Pelanggan Golden Revival</title>
    <meta name="description"
        content="Masuk ke portal pelanggan Golden Revival untuk akses eksklusif produk madu premium, pelacakan pesanan harian, dan promo menarik.">
    {{> honey_head }}
</head>

<body class="honey-theme">
    <div class="login-page honey-theme">
        <div class="login-container customer-login">
            <div class="login-card lux-card border-none">
                <div class="login-logo mb-6">
                    <img src="/assets/honey/logo.png" alt="Golden Revival Logo" style="height: 60px;">
                </div>
                <div class="login-header mb-8">
                    <h1 class="display-title" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Golden Portal</h1>
                    <p class="text-neutral-600">Masuk untuk akses eksklusif & kemudahan pelacakan.</p>
                </div>

                <div class="google-login-area">
                    <button type="button" onclick="loginWithGoogle()"
                        class="btn btn-honey-outline btn-full-width py-4 mb-8">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
                            style="width: 24px; margin-right: 12px;">
                        <span>Masuk dengan Google</span>
                    </button>

                    <div class="benefit-box bg-honey-100 border-none p-6 text-left rounded-xl" style="background: rgba(251, 243, 219, 0.5);">
                        <p class="text-honey-900 font-bold mb-4">
                            <i data-lucide="award"></i> Member Gold Benefits:
                        </p>
                        <ul class="text-honey-800 list-none p-0 flex flex-col gap-3">
                            <li class="flex items-center gap-3">
                                <span class="bg-honey-200 p-1 rounded-full"><i data-lucide="gift" size="16"></i></span>
                                <div><strong>Promo Eksklusif</strong> Madu Langka Dunia.</div>
                            </li>
                            <li class="flex items-center gap-3">
                                <span class="bg-honey-200 p-1 rounded-full"><i data-lucide="history" size="16"></i></span>
                                <div><strong>Lacak Pengiriman</strong> lebih praktis & cepat.</div>
                            </li>
                            <li class="flex items-center gap-3">
                                <span class="bg-honey-200 p-1 rounded-full"><i data-lucide="zap" size="16"></i></span>
                                <div><strong>Early Access</strong> produk panen terbatas.</div>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="mt-8 text-center">
                    <a href="/honey/" class="btn btn-honey-ghost text-honey-600">← Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </div>

    <script>window.CURRENT_BRAND = 'honey';</script>
    <script src="/js/app.js?v={{VERSION}}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();

            // Check auth status
            const userStr = localStorage.getItem('user');
            if (userStr) {
                const user = JSON.parse(userStr);
                if (user) {
                    window.location.href = '/honey/';
                    return;
                }
            }

            // Handle redirect from Google OAuth
            const params = new URLSearchParams(window.location.search);
            const authStatus = params.get('auth');
            const token = params.get('token');

            if (authStatus === 'success' && token) {
                localStorage.setItem('token', token);
                fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                    .then(res => res.json())
                    .then(result => {
                        if (result.success) {
                            localStorage.setItem('user', JSON.stringify(result.data));
                            const redirectPath = localStorage.getItem('login_redirect') || '/honey/';
                            localStorage.removeItem('login_redirect');
                            window.location.href = redirectPath;
                        }
                    });
            }
        });

        function loginWithGoogle() {
            localStorage.setItem('login_redirect', '/honey/');
            window.location.href = '/api/auth/google/login';
        }
    </script>
</body>

</html>
